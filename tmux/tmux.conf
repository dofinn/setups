# =============================================================================
# General
# =============================================================================
set -g mouse on                  # mouse scrolling
set -g history-limit 50000       # long scrollback
set -g base-index 1              # windows start at 1 not 0
set -g pane-base-index 1         # panes start at 1 too
set -g renumber-windows on       # keep window numbers tidy on close
set -g escape-time 0             # no delay for escape key (important for vim)
set -g focus-events on           # pass focus events to apps (helps vim)

# =============================================================================
# Prefix
# =============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# Vi mode (scrollback + search)
# =============================================================================
set -g mode-keys vi
set -g status-keys vi

# Better copy mode bindings
bind Enter copy-mode              # Ctrl+a Enter = enter scroll/copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# =============================================================================
# Windows (tabs)
# =============================================================================
bind c new-window -c "#{pane_current_path}"   # new tab, same dir
bind n next-window                             # Ctrl+a n = next tab (alt)
bind p previous-window                         # Ctrl+a p = prev tab (alt)

# =============================================================================
# Splits
# =============================================================================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical split
bind - split-window -v -c "#{pane_current_path}"   # horizontal split

# =============================================================================
# Pane navigation (vim hjkl)
# =============================================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (uppercase, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Session management
# =============================================================================
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# Visual
# =============================================================================
set -g status-style 'bg=#333333 fg=#aaaaaa'
set -g window-status-current-style 'fg=white bold'
set -g pane-border-style 'fg=#555555'
set -g pane-active-border-style 'fg=#aaaaaa'
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},node},claude,#{pane_current_command}}'
